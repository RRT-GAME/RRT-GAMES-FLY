<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RRT FLAPPY FINAL PRO</title>

<style>
body{margin:0;font-family:Arial;background:#70c5ce;overflow:hidden;}
canvas{display:block;margin:auto;}

#ui{position:absolute;width:400px;left:0;right:0;margin:auto;text-align:center;}

.panel{
position:absolute;width:400px;height:600px;
left:0;right:0;margin:auto;
background:#111;color:white;
display:none;
overflow-y:auto;
z-index:10;
}

.tabs{display:flex;}
.tab{flex:1;padding:10px;background:#222;cursor:pointer;}
.tab.active{background:orange;}

.shopItem{
background:#222;margin:10px;padding:10px;border-radius:10px;
}

.preview{
width:100px;height:50px;background:#000;margin:auto;
}
</style>
</head>

<body>

<div id="ui">

<div id="menu">
<h2>RRT-GAMES</h2>

<p>Coins: <span id="coinsUI">0</span></p>
<p>Best: <span id="bestUI">0</span></p>

<button onclick="startGame()">START</button>
<button onclick="openShop()">SHOP</button>
<button onclick="openUpgrades()">UPDATES</button>
<button onclick="resetSave()">RESET SAVE</button>
</div>

<div id="dead" style="display:none;">
<h3>GAME OVER</h3>
<button onclick="respawn()">RESPAWN</button>
<button onclick="backMenu()">MENU</button>
</div>

</div>

<!-- SHOP -->
<div class="panel" id="shop">

<div class="tabs">
<div class="tab active" onclick="tab('skins')">SKINS</div>
<div class="tab" onclick="tab('upgrades')">UPGRADES</div>
</div>

<div id="skinsTab"></div>
<div id="upgradesTab" style="display:none;"></div>

<button onclick="closeShop()">BACK</button>

</div>

<!-- UPDATES -->
<div class="panel" id="updates">
<h2>UPDATES</h2>
<p>saving of game progress has been added</p>
<p>cloud save system has been added</p>
<p>anti-cheat system has been added</p>
<button onclick="closeUpdates()">BACK</button>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

let state="menu";

let bird,pipes=[];
let score=0,coins=0,best=0;

let skins={
default:{price:0,owned:true,color:"yellow"},
red:{price:10,owned:false,color:"red"},
blue:{price:25,owned:false,color:"blue"},
glow:{price:100,owned:false,color:"cyan"}
};

let currentSkin="default";
let magnetLevel=0;

// ================= CLOUD SAVE (API READY) =================
const CLOUD_URL = "https://your-server.com/api/save"; 
// <- später Firebase / Backend

// ================= ANTI CHEAT =================
function antiCheat(){
if(coins < 0) coins = 0;
if(best < 0) best = 0;
if(magnetLevel < 0) magnetLevel = 0;
}

// ================= SAVE =================
function saveGame(){

antiCheat();

let data = {
coins,
best,
skins,
currentSkin,
magnetLevel
};

// LOCAL SAVE
localStorage.setItem("rrt_save", JSON.stringify(data));

// CLOUD SAVE (Google-style backend)
fetch(CLOUD_URL, {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
}).catch(()=>{});

}

// ================= LOAD =================
async function loadGame(){

try{
let res = await fetch(CLOUD_URL);
if(res.ok){
applySave(await res.json());
return;
}
}catch(e){}

let data = localStorage.getItem("rrt_save");
if(data) applySave(JSON.parse(data));

}

// ================= APPLY SAVE =================
function applySave(s){

coins = s.coins || 0;
best = s.best || 0;
magnetLevel = s.magnetLevel || 0;
currentSkin = s.currentSkin || "default";

if(s.skins){
for(let k in s.skins){
if(skins[k]) skins[k].owned = s.skins[k].owned;
}
}

antiCheat();
updateUI();
}

// ================= RESET SAVE =================
function resetSave(){
localStorage.removeItem("rrt_save");
coins=0;
best=0;
magnetLevel=0;
currentSkin="default";

for(let k in skins){
if(k!="default") skins[k].owned=false;
}

saveGame();
updateUI();
alert("Save reset!");
}

// ================= GAME =================
function resetGame(){
bird={x:100,y:300,vel:0};
pipes=[];
score=0;
}

function updateUI(){
coinsUI.innerText=coins;
bestUI.innerText=best;
}

function startGame(){
resetGame();
state="game";
menu.style.display="none";
dead.style.display="none";
}

function respawn(){ startGame(); }

function backMenu(){
state="menu";
menu.style.display="block";
dead.style.display="none";
updateUI();
}

// ================= SHOP =================
function openShop(){
shop.style.display="block";
state="shop";
renderShop();
}

function closeShop(){
shop.style.display="none";
state="menu";
updateUI();
}

function tab(t){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));

if(t==="skins"){
skinsTab.style.display="block";
upgradesTab.style.display="none";
document.querySelectorAll(".tab")[0].classList.add("active");
}else{
skinsTab.style.display="none";
upgradesTab.style.display="block";
document.querySelectorAll(".tab")[1].classList.add("active");
}
}

function renderShop(){

let html="";
for(let k in skins){
let s=skins[k];

html+=`
<div class="shopItem">
<b>${k}</b><br>
Price: ${s.price}<br>
<canvas class="preview" id="p_${k}" width="100" height="50"></canvas><br>

${!s.owned ?
`<button onclick="buySkin('${k}')">BUY</button>` :
`<button onclick="equip('${k}')">EQUIP</button>`}
</div>
`;
}
skinsTab.innerHTML=html;

for(let k in skins) drawPreview(k);

upgradesTab.innerHTML=`
<div class="shopItem">
Magnet Level: ${magnetLevel}<br>
Pull Power: ${magnetLevel*20}%<br>
<button onclick="buyMagnet()">UPGRADE (50)</button>
</div>
`;
}

function drawPreview(k){
let canvas=document.getElementById("p_"+k);
if(!canvas) return;
let ctx=canvas.getContext("2d");

ctx.clearRect(0,0,100,50);
ctx.fillStyle=skins[k].color;
ctx.beginPath();
ctx.arc(50,25,10,0,Math.PI*2);
ctx.fill();
}

// ================= SHOP ACTIONS =================
function buySkin(k){
let s=skins[k];
if(coins>=s.price){
coins-=s.price;
s.owned=true;
currentSkin=k;
renderShop();
saveGame();
}
}

function equip(k){
currentSkin=k;
renderShop();
saveGame();
}

function buyMagnet(){
if(coins>=50){
coins-=50;
magnetLevel++;
renderShop();
saveGame();
}
}

// ================= UPDATES =================
function openUpgrades(){
updates.style.display="block";
state="updates";
}
function closeUpdates(){
updates.style.display="none";
state="menu";
}

// ================= INPUT =================
document.addEventListener("keydown",e=>{
if(e.code==="Space" && state==="game") jump();
});

c.addEventListener("click",()=>{
if(state==="game") jump();
});

function jump(){ bird.vel=-6.5; }

// ================= LOOP =================
let frame=0;

function update(){
if(state!=="game") return;

bird.vel+=0.35;
bird.y+=bird.vel;

if(frame%90===0){
let t=100+Math.random()*250;
pipes.push({x:400,top:t,bottom:t+150,scored:false});
}

for(let p of pipes){
p.x-=3;

if(hit(p)) die();

if(!p.scored && p.x<bird.x){
score++;
coins++;
p.scored=true;
}
}

pipes=pipes.filter(p=>p.x>-100);

if(bird.y>520) die();
}

function hit(p){
return bird.x<p.x+70 && bird.x+20>p.x &&
(bird.y<p.top || bird.y>p.bottom);
}

function die(){
state="dead";
dead.style.display="block";
if(score>best) best=score;

saveGame();
updateUI();
}

// ================= DRAW =================
function draw(){
ctx.clearRect(0,0,400,600);

ctx.fillStyle="#70c5ce";
ctx.fillRect(0,0,400,600);

ctx.fillStyle="#d2b48c";
ctx.fillRect(0,520,400,80);

if(state==="game"||state==="dead"){

ctx.fillStyle=skins[currentSkin].color;
ctx.beginPath();
ctx.arc(bird.x,bird.y,10,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="green";
pipes.forEach(p=>{
ctx.fillRect(p.x,0,70,p.top);
ctx.fillRect(p.x,p.bottom,70,600);
});

ctx.fillStyle="black";
ctx.fillText("Coins: "+coins,10,20);
ctx.fillText("Score: "+score,10,35);
ctx.fillText("Best: "+best,10,50);
}
}

function loop(){
frame++;
update();
draw();
requestAnimationFrame(loop);
}
loop();

// ================= INIT =================
loadGame();
updateUI();

setInterval(()=>{
antiCheat();
saveGame();
},5000);

</script>

</body>
</html>
