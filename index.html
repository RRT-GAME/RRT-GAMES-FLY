<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RRT FLAPPY ULTIMATE</title>

<style>
body{margin:0;font-family:Arial;background:#70c5ce;overflow:hidden;}
canvas{display:block;margin:auto;}

#ui{position:absolute;width:400px;left:0;right:0;margin:auto;text-align:center;}

.panel{
position:absolute;width:400px;height:600px;
left:0;right:0;margin:auto;
background:#111;color:white;
display:none;
overflow-y:auto;
z-index:10;
opacity:0;
transform:scale(0.9);
transition:0.2s;
}
.panel.show{opacity:1;transform:scale(1);}

.tabs{display:flex;}
.tab{flex:1;padding:10px;background:#222;cursor:pointer;}
.tab.active{background:orange;}

.shopItem{background:#222;margin:10px;padding:10px;border-radius:10px;}
.preview{width:100px;height:50px;background:#000;margin:auto;}
</style>
</head>

<body>

<div id="ui">
<div id="menu">
<h2>RRT-GAMES</h2>
<p>Coins: <span id="coinsUI">0</span></p>
<p>Best: <span id="bestUI">0</span></p>
<button onclick="startGame()">START</button>
<button onclick="openShop()">SHOP</button>
<button onclick="openUpdates()">UPDATES</button>
</div>

<div id="dead" style="display:none;">
<h3>GAME OVER</h3>
<button onclick="startGame()">RETRY</button>
<button onclick="backMenu()">MENU</button>
</div>
</div>

<div class="panel" id="shop">
<div class="tabs">
<div class="tab active" onclick="tab('skins')">SKINS</div>
<div class="tab" onclick="tab('upgrades')">UPGRADES</div>
</div>
<div id="skinsTab"></div>
<div id="upgradesTab" style="display:none;"></div>
<button onclick="closeShop()">BACK</button>
</div>

<div class="panel" id="updates">
<h2>UPDATES</h2>
<div id="log"></div>
<button onclick="closeUpdates()">BACK</button>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

const menu=document.getElementById("menu");
const dead=document.getElementById("dead");
const shop=document.getElementById("shop");
const updates=document.getElementById("updates");
const log=document.getElementById("log");
const coinsUI=document.getElementById("coinsUI");
const bestUI=document.getElementById("bestUI");
const skinsTab=document.getElementById("skinsTab");
const upgradesTab=document.getElementById("upgradesTab");

let state="menu";
let bird,pipes=[];
let score=0,coins=0,best=0;
let frame=0;

/* ================= AUTO UPDATE SYSTEM (NEU) ================= */
const CURRENT_VERSION = "1.0.0";
let updateShown = false;

async function checkForUpdates(){
  try{
    const res = await fetch("update.json?time=" + Date.now());
    const data = await res.json();

    if(!data.version) return;

    let savedVersion = localStorage.getItem("rrt_version");

    // 🟢 ERSTER START → speichern
    if(!savedVersion){
      localStorage.setItem("rrt_version", data.version);
      return;
    }

    // 🟢 kein Update
    if(savedVersion === data.version) return;

    // 🟢 Schutz gegen Spam
    if(updateShown) return;
    updateShown = true;

    console.log("Update gefunden:", data.version);

    log.innerHTML =
      "🔄 Update gefunden: " + data.version +
      "<br>" + (data.message || "Neues Update verfügbar!");

    updates.style.display = "block";
    updates.classList.add("show");

    // speichern
    localStorage.setItem("rrt_version", data.version);

    setTimeout(()=>{
      location.reload();
    }, 2000);

  } catch(e){
    console.log("Update check failed", e);
  }
}

setInterval(checkForUpdates, 10000);
checkForUpdates();
/* ================= SAVE SYSTEM ================= */
function saveGame(){
  const data = {
    coins,
    best,
    skins,
    currentSkin
  };
  localStorage.setItem("rrt_flappy_save", JSON.stringify(data));
}

function loadGame(){
  const data = JSON.parse(localStorage.getItem("rrt_flappy_save"));
  if(!data) return;

  coins = data.coins ?? 0;
  best = data.best ?? 0;
  currentSkin = data.currentSkin ?? "default";

  if(data.skins){
    for(let k in data.skins){
      if(skins[k]){
        skins[k].owned = data.skins[k].owned;
      }
    }
  }
}

// SOUND
const AC=window.AudioContext||window.webkitAudioContext;
const audio=new AC();

function music(){
const notes=[440,660,550,440,330,440,550,660];
let i=0;

setInterval(()=>{
if(state!=="game")return;
if(audio.state==="suspended")audio.resume();

let o=audio.createOscillator();
let g=audio.createGain();

o.type="sine";
o.frequency.value=notes[i%notes.length];

g.gain.value=0.05;

o.connect(g);
g.connect(audio.destination);

o.start();
o.stop(audio.currentTime+0.12);

i++;
},150);
}
music();

function beep(f=440){
if(audio.state==="suspended")audio.resume();
let o=audio.createOscillator();
let g=audio.createGain();
o.connect(g);g.connect(audio.destination);
o.frequency.value=f;
g.gain.value=0.08;
o.start();
g.gain.exponentialRampToValueAtTime(0.0001,audio.currentTime+0.1);
o.stop(audio.currentTime+0.1);
}

// SKINS
let skins={
default:{price:0,owned:true,color:"yellow"},
red:{price:10,owned:false,color:"red"},
blue:{price:10,owned:false,color:"blue"},
green:{price:10,owned:false,color:"lime"}
};
let currentSkin="default";

// PARTICLES
let particles=[];
function spawnParticle(x,y){
particles.push({x,y,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:30});
}

// GAME
function reset(){bird={x:100,y:300,vel:0,angle:0};pipes=[];score=0;}
function startGame(){reset();state="game";menu.style.display="none";dead.style.display="none";}
function backMenu(){state="menu";menu.style.display="block";dead.style.display="none";updateUI();saveGame();}

// SHOP
function openShop(){shop.style.display="block";shop.classList.add("show");renderShop();}
function closeShop(){shop.style.display="none";shop.classList.remove("show");saveGame();}
function openUpdates(){updates.style.display="block";updates.classList.add("show");renderLog();}
function closeUpdates(){updates.style.display="none";updates.classList.remove("show");}

function tab(t){
skinsTab.style.display=t==="skins"?"block":"none";
upgradesTab.style.display=t==="upgrades"?"block":"none";
}

function renderLog(){
log.innerHTML="• Sound + wings improved";
}

function renderShop(){
let html="";
for(let k in skins){
let s=skins[k];
html+=`<div class='shopItem'>${k}<br>Price:${s.price}<br><canvas id='p_${k}' width='100' height='50' class='preview'></canvas><br>${s.owned?`<button onclick="equip('${k}')">EQUIP</button>`:`<button onclick="buySkin('${k}')">BUY</button>`}</div>`;
}
skinsTab.innerHTML=html;
for(let k in skins) drawPreview(k);
upgradesTab.innerHTML="No upgrades";
}

function buySkin(k){
let s=skins[k];
if(coins>=s.price){
coins-=s.price;
s.owned=true;
currentSkin=k;
updateUI();
renderShop();
saveGame();
}
}
function equip(k){currentSkin=k;renderShop();saveGame();}

// PREVIEW
function drawPreview(k){
let canvas=document.getElementById("p_"+k);
if(!canvas)return;
let ctx=canvas.getContext("2d");
let t=0;

function loop(){
ctx.clearRect(0,0,100,50);
t+=0.1;
let s=skins[k];

ctx.fillStyle=s.color;
ctx.beginPath();
ctx.arc(50,25,10,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(53,22,3,0,Math.PI*2);
ctx.arc(53,28,3,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(54,22,1.3,0,Math.PI*2);
ctx.arc(54,28,1.3,0,Math.PI*2);
ctx.fill();

let flap=Math.sin(t*8);

ctx.fillStyle="rgba(255,255,255,0.9)";
ctx.beginPath();

if(flap>0){
ctx.moveTo(40,25);
ctx.quadraticCurveTo(15,10,30,15);
ctx.quadraticCurveTo(38,18,40,25);
}else{
ctx.moveTo(40,25);
ctx.quadraticCurveTo(15,40,30,35);
ctx.quadraticCurveTo(38,32,40,25);
}

ctx.fill();

requestAnimationFrame(loop);
}
loop();
}

// INPUT
document.addEventListener("keydown",e=>{if(e.code==="Space")jump();});
c.addEventListener("click",()=>jump());
function jump(){bird.vel=-6;beep(520);spawnParticle(bird.x,bird.y);}

// DIFFICULTY
let pipeGap=150;
let speed=3;
function difficulty(){pipeGap=Math.max(90,150-score*2);speed=3+score*0.05;}

// UPDATE
function update(){
if(state!=="game")return;

difficulty();

bird.vel+=0.35;
bird.y+=bird.vel;
bird.angle=bird.vel*0.08;

if(frame%90===0){
pipes.push({x:400,top:100+Math.random()*250,passed:false});
}

for(let p of pipes){
p.x-=speed;

if(!p.passed && p.x<bird.x){
p.passed=true;
score++;
coins++;
beep(700);
}

if(bird.x<p.x+70&&bird.x+20>p.x&&(bird.y<p.top||bird.y>p.top+pipeGap))die();
}

if(bird.y>520)die();
}

function die(){
state="dead";
dead.style.display="block";
if(score>best)best=score;
beep(140);
updateUI();
saveGame();
}

// DRAW
function draw(){
ctx.clearRect(0,0,400,600);

ctx.fillStyle="#70c5ce";
ctx.fillRect(0,0,400,600);

ctx.fillStyle="#d2b48c";
ctx.fillRect(0,520,400,80);

particles=particles.filter(p=>p.life>0);
for(let p of particles){
p.x+=p.vx;
p.y+=p.vy;
p.life--;
ctx.fillStyle="white";
ctx.fillRect(p.x,p.y,3,3);
}

if(state==="game"||state==="dead"){
ctx.save();
ctx.translate(bird.x,bird.y);
ctx.rotate(bird.angle);

let s=skins[currentSkin];
ctx.fillStyle=s.color;
ctx.beginPath();
ctx.arc(0,0,10,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(4,-3,3,0,Math.PI*2);
ctx.arc(4,3,3,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(5,-3,1.3,0,Math.PI*2);
ctx.arc(5,3,1.3,0,Math.PI*2);
ctx.fill();

let flap=Math.sin(frame*0.8);

ctx.fillStyle="rgba(255,255,255,0.9)";
ctx.beginPath();

if(flap>0){
ctx.moveTo(-2,0);
ctx.quadraticCurveTo(-25,-15,-10,-8);
ctx.quadraticCurveTo(-5,-5,-2,0);
}else{
ctx.moveTo(-2,0);
ctx.quadraticCurveTo(-25,15,-10,8);
ctx.quadraticCurveTo(-5,5,-2,0);
}

ctx.fill();

ctx.restore();

for(let p of pipes){
ctx.fillStyle="green";
ctx.fillRect(p.x,0,70,p.top);
ctx.fillRect(p.x,p.top+pipeGap,70,600);
}

ctx.fillStyle="black";
ctx.fillText("Score:"+score,10,20);
ctx.fillText("Coins:"+coins,10,40);
ctx.fillText("Best:"+best,10,60);
}
}

function loop(){frame++;update();draw();requestAnimationFrame(loop);}loop();

function updateUI(){
coinsUI.innerText=coins;
bestUI.innerText=best;
}

// INIT
loadGame();
updateUI();
</script>
</body>
</html>
